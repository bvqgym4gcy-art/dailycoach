function buildAll(saved={}) {
  const res={...saved};
  const s=new Date("2026-03-28"),e=new Date("2026-04-30");
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    const k=dateKey(new Date(d));
    if(res[k]) continue;
    const gcal=GCAL.filter(ev=>ev.date===k).map((ev,i)=>({...ev,id:parseInt(k.replace(/-/g,""))*100+80+i,fromCal:true,streak:false}));
    res[k]=[...BASE,...(k==="2026-03-28"?TODAY_X:[])].map((a,i)=>({...a,id:parseInt(k.replace(/-/g,""))*100+i})).concat(gcal);
  }
  return res;
}

function calcStreak(allActs,checks){
  let s=0;
  for(let i=1;i<=60;i++){
    const k=dateKey(addDays(new Date(),-i));
    const acts=(allActs[k]||[]).filter(a=>a.streak);
    if(!acts.length){s++;continue;}
    if(!acts.some(a=>(checks[k]||{})[a.id])) break;
    s++;
  }
  return s;
}
function calcBest(allActs,checks){
  let best=0,cur=0;
  for(const k of Object.keys(allActs).sort()){
    const acts=(allActs[k]||[]).filter(a=>a.streak);
    if(!acts.length||acts.some(a=>(checks[k]||{})[a.id])) cur++;
    else cur=0;
    if(cur>best) best=cur;
  }
  return best;
}
function calDays(m){
  const y=m.getFullYear(),mo=m.getMonth();
  const offset=(new Date(y,mo,1).getDay()+6)%7;
  const dim=new Date(y,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(new Date(y,mo,d));
  return cells;
}

              e("div",{style:{flex:1,minWidth:0}},
                e("div",{style:{fontSize:13,fontWeight:500,color:isDone?"#252525":"#e0e0e0",textDecoration:isDone?"line-through":"none",marginBottom:2}},act.title),
                e("div",{style:{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}},
                  e("span",{style:{fontSize:10,color:"#444"}},`⏱${act.time}`),
                  e("span",{style:{fontSize:10,color:"#2a2a2a"}},"·"),
                  e("span",{style:{fontSize:10,color:"#444"}},`${act.duration}min`),
                  e("span",{style:{fontSize:9,color:"#333",border:"1px solid #1a1a1a",padding:"1px 5px",borderRadius:5}},act.category),
                  act.streak && e("span",{style:{fontSize:9,color:"#444"}},"🔥"),
                  act.fromCal && e("span",{style:{fontSize:9,color:"#333",border:"1px solid #1a1a1a",padding:"1px 4px",borderRadius:5}},"cal"),
                  hasNote && e("span",{style:{fontSize:10,color:"#666"}},"✎")
                )
              ),
              e("div",{style:{display:"flex",gap:1}},
                e("button",{onClick:()=>{setNoteAct(act);setNoteDraft(notes[`${ck}_${act.id}`]||"");},style:{padding:5,color:hasNote?"#aaa":"#2a2a2a",fontSize:13,background:"none",border:"none",cursor:"pointer"}},"✎"),
                e("button",{onClick:()=>{setEditItem(act);setNewAct({time:act.time,title:act.title,category:act.category,duration:act.duration,streak:!!act.streak});setShowAdd(true);},style:{padding:5,color:"#2a2a2a",fontSize:11,background:"none",border:"none",cursor:"pointer"}},"⚙"),
                e("button",{onClick:()=>setDelId(act.id),style:{padding:5,color:"#1e1e1e",fontSize:11,background:"none",border:"none",cursor:"pointer"}},"✕")
              )
            )
          );
        }),
        isToday && e("button",{onClick:()=>{setShowAdd(true);setEditItem(null);setNewAct({time:"",title:"",category:"routine",duration:30,streak:false});},style:{width:"100%",padding:12,marginTop:2,border:"1px dashed #1a1a1a",borderRadius:13,color:"#2a2a2a",fontSize:12,background:"none",cursor:"pointer"}},"+  Aggiungi attività")
      ),

      // CALENDAR
      tab==="calendar" && e("div",{style:{paddingTop:14}},
        e("div",{style:C.card},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
            e("div",{style:{fontSize:16,fontWeight:700}},fmtMonth(calMonth)),
            e("div",{style:{display:"flex",gap:6}},
              e("button",{onClick:()=>setCalMonth(m=>{const d=new Date(m);d.setMonth(d.getMonth()-1);return d;}),style:{background:"#1a1a1a",border:"1px solid #222",borderRadius:8,width:30,height:30,color:"#fff",fontSize:15,cursor:"pointer"}},"‹"),
              e("button",{onClick:()=>setCalMonth(m=>{const d=new Date(m);d.setMonth(d.getMonth()+1);return d;}),style:{background:"#1a1a1a",border:"1px solid #222",borderRadius:8,width:30,height:30,color:"#fff",fontSize:15,cursor:"pointer"}},"›")
            )
          ),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:5}},
            ["L","M","M","G","V","S","D"].map((d,i)=>e("div",{key:i,style:{textAlign:"center",fontSize:10,color:"#444",fontWeight:600,padding:"3px 0"}},d))
          ),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
            calDays(calMonth).map((d,i)=>{
              if(!d) return e("div",{key:i});
              const k=dateKey(d),v=history[k],r=v?.rate||0,isT=k===todayKey(),isSel=k===ck;
              return e("button",{key:i,onClick:()=>{setCurDate(new Date(d));setTab("today");},style:{aspectRatio:"1",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",cursor:"pointer",border:`1px solid ${isSel?"#fff":isT?"#333":"#0f0f0f"}`,background:isSel?"#fff":r>=80?"#1a1a1a":r>=1?"#111":"#080808"}},
                e("span",{style:{fontSize:12,fontWeight:isT?700:400,color:isSel?"#000":isT?"#fff":"#444"}},String(d.getDate())),
                r>0 && e("div",{style:{width:3,height:3,borderRadius:"50%",background:isSel?"#000":"#fff",marginTop:1}})
              );
            })
          )
        ),
        e("span",{style:{...C.lbl,marginBottom:10}},"Records — 30 giorni"),
        e("div",{style:C.card},
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}},
            [{i:"🔥",v:streak,l:"CURRENT STREAK"},{i:"🏅",v:calcBest(allActs,checks),l:"BEST STREAK"},{i:"✓",v:totalDone30,l:"COMPLETED"},{i:"⚑",v:`${avgRate30}%`,l:"SUCCESS RATE"}].map(({i,v,l})=>
              e("div",{key:l,style:{textAlign:"center"}},
                e("div",{style:{fontSize:24,marginBottom:3}},i),
                e("div",{style:{fontSize:26,fontWeight:700}},String(v)),
                e("div",{style:{fontSize:9,color:"#444",letterSpacing:1,marginTop:3}},l)
              )
            )
          )
        )
      ),

      // STATS
      tab==="stats" && e("div",{style:{paddingTop:14}},
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
          [{l:"Oggi",v:`${rate}%`,s:`${done}/${total}`},{l:"Streak",v:`${streak}gg`,s:"consecutivi"},{l:"Media 7gg",v:(()=>{const l=Object.values(history).slice(-7);return l.length?`${Math.round(l.reduce((s,v)=>s+v.rate,0)/l.length)}%`:"—";})(),s:"completion"},{l:"Saltate",v:String(total-done),s:"oggi"}].map(k=>
            e("div",{key:k.l,style:C.card},
              e("div",{style:{fontSize:10,color:"#444",marginBottom:3}},k.l),
              e("div",{style:{fontSize:24,fontWeight:700}},k.v),
              e("div",{style:{fontSize:10,color:"#333"}},k.s)
            )
          )
        ),
        e("div",{style:C.card},
          e("span",{style:C.lbl},"14 giorni"),
          e("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:60}},
            Array.from({length:14},(_,i)=>{
              const d=addDays(new Date(),-(13-i)),k=dateKey(d),r=(history[k]?.rate||0),isT=k===todayKey(),mood=moods[k];
              return e("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}},
                mood && e("div",{style:{fontSize:7,lineHeight:1}},MOODS.find(m=>m.v===mood)?.e||""),
                e("div",{style:{width:"100%",borderRadius:2,background:isT?"#fff":r>=80?"#777":r>=30?"#2a2a2a":"#141414",height:`${Math.max(r,3)}%`,minHeight:3}}),
                i%3===0 && e("div",{style:{fontSize:7,color:"#2a2a2a"}},String(d.getDate()))
              );
            })
          )
        ),
        e("div",{style:C.card},
          e("span",{style:C.lbl},"Streak abitudini"),
          ...habitList.map(title=>{
            const s=hStreak(title);
            return e("div",{key:title,style:{marginBottom:12}},
              e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                e("div",{style:{fontSize:11,color:"#777"}},title.replace(/Pillola — /,"")),
                e("div",{style:{fontSize:11,fontWeight:700}},`🔥${s}`)
              ),
              e("div",{style:{display:"flex",gap:3}},
                Array.from({length:7},(_,i)=>{
                  const k2=dateKey(addDays(new Date(),-(6-i)));
                  const act=(allActs[k2]||[]).find(a=>a.title===title);
                  const dd=act&&(checks[k2]||{})[act.id],isT2=k2===todayKey();
                  return e("div",{key:i,style:{flex:1,height:6,borderRadius:3,background:dd?"#fff":isT2?"#1f1f1f":"#111",border:`1px solid ${isT2?"#2a2a2a":"transparent"}`}});
                })
              )
            );
          })
        ),
        e("div",{style:C.card},
          e("span",{style:C.lbl},"Umore 7 giorni"),
          e("div",{style:{display:"flex",gap:6}},
            Array.from({length:7},(_,i)=>{
              const d=addDays(new Date(),-(6-i)),k=dateKey(d),mood=moods[k],isT=k===todayKey();
              return e("div",{key:i,style:{flex:1,textAlign:"center"}},
                e("div",{style:{fontSize:18,opacity:mood?1:0.1}},mood?MOODS.find(m=>m.v===mood)?.e:"😐"),
                e("div",{style:{fontSize:8,color:isT?"#fff":"#2a2a2a",marginTop:3}},d.toLocaleDateString("it-IT",{weekday:"narrow"}))
              );
            })
          )
        )
      ),

      // AI
      tab==="ai" && e("div",{style:{paddingTop:14}},
        e("div",{style:C.card},
          e("div",{style:{fontSize:14,fontWeight:700,marginBottom:3}},"AI Coach"),
          e("div",{style:{fontSize:11,color:"#444",marginBottom:14}},"Analizza i tuoi pattern reali e ti dice cosa ottimizzare."),
          e("button",{onClick:fetchAI,disabled:aiLoad,style:{width:"100%",padding:13,background:aiLoad?"#0d0d0d":"#fff",border:`1px solid ${aiLoad?"#1a1a1a":"#fff"}`,borderRadius:11,color:aiLoad?"#333":"#000",fontSize:13,fontWeight:600,cursor:aiLoad?"not-allowed":"pointer"}},aiLoad?"Analisi in corso...":"Analizza la mia giornata")
        ),
        ...(aiRes||[]).map((ins,i)=>
          e("div",{key:i,style:{...C.card,borderColor:"#1f1f1f"}},
            e("div",{style:{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:1,marginBottom:5}},ins.title),
            e("div",{style:{fontSize:13,color:"#bbb",lineHeight:1.6}},ins.text)
          )
        )
      )
    ),

    // MODALS
    showMood && e("div",{onClick:()=>setShowMood(false),style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}},
      e("div",{onClick:e=>e.stopPropagation(),style:{width:"100%",maxWidth:480,background:"#0d0d0d",border:"1px solid #222",borderRadius:"20px 20px 0 0",padding:24}},
        e("div",{style:{fontSize:15,fontWeight:700,marginBottom:3}},"Come ti senti oggi?"),
        e("div",{style:{fontSize:11,color:"#555",marginBottom:18}},"L'AI usa il tuo umore per trovare pattern."),
        e("div",{style:{display:"flex",gap:8}},
          MOODS.map(m=>e("button",{key:m.v,onClick:()=>saveMood(m.v),style:{flex:1,padding:"13px 0",background:todayMood===m.v?"#fff":"#111",border:`1px solid ${todayMood===m.v?"#fff":"#1a1a1a"}`,borderRadius:12,fontSize:22,cursor:"pointer"}},m.e))
        )
      )
    ),

    noteAct && e("div",{onClick:()=>setNoteAct(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}},
      e("div",{onClick:e=>e.stopPropagation(),style:{width:"100%",maxWidth:480,background:"#0d0d0d",border:"1px solid #222",borderRadius:"20px 20px 0 0",padding:24}},
        e("div",{style:{fontSize:14,fontWeight:700,marginBottom:2}},noteAct.title),
        e("div",{style:{fontSize:10,color:"#555",marginBottom:14}},`⏱${noteAct.time} · ${fmtLong(curDate)}`),
        e("textarea",{value:noteDraft,onChange:ev=>setNoteDraft(ev.target.value),placeholder:"Come è andata?",rows:5,style:{...C.inp,display:"block",marginBottom:12,height:120}}),
        e("div",{style:{display:"flex",gap:8}},
          e("button",{onClick:()=>setNoteAct(null),style:C.sec},"Annulla"),
          e("button",{onClick:saveNote,style:C.pri},"Salva")
        )
      )
    ),

    showAdd && e("div",{onClick:()=>setShowAdd(false),style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}},
      e("div",{onClick:ev=>ev.stopPropagation(),style:{width:"100%",maxWidth:480,background:"#0d0d0d",border:"1px solid #222",borderRadius:"20px 20px 0 0",padding:24}},
        e("div",{style:{fontSize:15,fontWeight:700,marginBottom:14}},editItem?"Modifica":"Nuova attività"),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
          e("div",null,e("span",{style:C.lbl},"Orario"),e("input",{type:"time",value:newAct.time,onChange:ev=>setNewAct(n=>({...n,time:ev.target.value})),style:C.inp})),
          e("div",null,e("span",{style:C.lbl},"Durata (min)"),e("input",{type:"number",value:newAct.duration,onChange:ev=>setNewAct(n=>({...n,duration:parseInt(ev.target.value)||30})),style:C.inp}))
        ),
        e("div",{style:{marginBottom:12}},e("span",{style:C.lbl},"Nome"),e("input",{type:"text",value:newAct.title,onChange:ev=>setNewAct(n=>({...n,title:ev.target.value})),placeholder:"es. Meditazione",style:C.inp})),
        e("div",{style:{marginBottom:12}},
          e("span",{style:C.lbl},"Categoria"),
          e("div",{style:{display:"flex",gap:5,flexWrap:"wrap"}},
            CATS.map(cat=>e("button",{key:cat,onClick:()=>setNewAct(n=>({...n,category:cat})),style:{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:500,cursor:"pointer",background:newAct.category===cat?"#fff":"#111",color:newAct.category===cat?"#000":"#444",border:`1px solid ${newAct.category===cat?"#fff":"#1f1f1f"}`}},cat))
          )
        ),
        e("button",{onClick:()=>setNewAct(n=>({...n,streak:!n.streak})),style:{width:"100%",padding:11,marginBottom:12,borderRadius:11,fontSize:12,fontWeight:500,cursor:"pointer",background:newAct.streak?"#fff":"#111",color:newAct.streak?"#000":"#444",border:`1px solid ${newAct.streak?"#fff":"#1f1f1f"}`}},`🔥 ${newAct.streak?"Streak attivo":"Attiva streak"}`),
        e("div",{style:{display:"flex",gap:8}},
          e("button",{onClick:()=>setShowAdd(false),style:C.sec},"Annulla"),
          e("button",{onClick:saveAct,style:C.pri},editItem?"Salva":"Aggiungi")
        )
      )
    ),

    delId && e("div",{onClick:()=>setDelId(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}},
      e("div",{onClick:ev=>ev.stopPropagation(),style:{background:"#0d0d0d",border:"1px solid #222",borderRadius:20,padding:24,margin:"0 20px",maxWidth:300,width:"100%"}},
        e("div",{style:{fontSize:15,fontWeight:700,marginBottom:6}},"Eliminare?"),
        e("div",{style:{fontSize:12,color:"#444",marginBottom:18}},"Non può essere annullato."),
        e("div",{style:{display:"flex",gap:8}},
          e("button",{onClick:()=>setDelId(null),style:C.sec},"Annulla"),
          e("button",{onClick:()=>delAct(delId),style:C.pri},"Elimina")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
